{% extends 'core/base.html' %}
{% load static %}

{% block title %}SpecBox | Регистрация{% endblock %}

{% block extra_css %}
    <!-- Подключаем стили регистрации -->
    <link rel="stylesheet" href="{% static 'core/css/style_register.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Регистрация</h2>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Имя пользователя</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Подтверждение пароля</label>
                <input type="password" name="password_confirm" class="form-control" required>
            </div>

            <div class="terms-checkbox">
                <input type="checkbox" name="terms" id="terms" required>
                <label for="terms">Я согласен с условиями использования</label>
            </div>

            <button type="submit" class="btn-submit">Зарегистрироваться</button>
        </form>

        <p class="auth-hint">
            Уже есть аккаунт? <a href="{% url 'core:login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
