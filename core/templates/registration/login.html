{% extends 'core/base.html' %}
{% load static %}

{% block title %}SpecBox | Вход{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 40px 20px;
    }

    .auth-card {
        background: rgba(25, 25, 50, 0.75);
        border: 1px solid rgba(157, 78, 221, 0.3);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .auth-title {
        font-size: 2rem;
        color: #ffffff;
        text-align: center;
        margin-bottom: 30px;
        font-weight: 700;
    }

    .auth-error {
        background: rgba(255, 82, 82, 0.15);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff5252;
        padding: 12px 18px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-label {
        color: #c5c5e0;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-control {
        background: rgba(30, 30, 60, 0.8);
        border: 1px solid rgba(157, 78, 221, 0.3);
        border-radius: 10px;
        padding: 14px 18px;
        color: #e0e0ff;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #9d4edd;
        box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.2);
    }

    .btn-submit {
        background: linear-gradient(135deg, #9d4edd 0%, #7e3cc5 100%);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(157, 78, 221, 0.5);
    }

    .auth-hint {
        text-align: center;
        margin-top: 25px;
        color: #b0b0d0;
        font-size: 0.95rem;
    }

    .auth-hint a {
        color: #9d4edd;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-hint a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Вход в аккаунт</h2>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Имя пользователя</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-submit">Войти</button>
        </form>

        <p class="auth-hint">
            Нет аккаунта? <a href="{% url 'core:register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
