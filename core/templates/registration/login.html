{% extends 'core/base.html' %}
{% load static %}

{% block title %}SpecBox | Вход{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/style_login.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Вход в аккаунт</h2>

        {% if error %}
        <div class="auth-error">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Имя пользователя или Email</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин или email" required value="{{ username|default:'' }}">
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="btn-submit">
                Войти
            </button>
        </form>

        <div class="auth-hint">
            Нет аккаунта? <a href="{% url 'core:register' %}">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
