{% extends 'core/base.html' %}
{% load static %}

{% block title %}SpecBox | Вход{% endblock %}

{% block extra_css %}
    <!-- Подключаем стили входа -->
    <link rel="stylesheet" href="{% static 'core/css/style_login.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Вход в аккаунт</h2>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Имя пользователя или Email</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-submit">Войти</button>
        </form>

        <p class="auth-hint">
            Нет аккаунта? <a href="{% url 'core:register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
